name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version pinned via packageManager field in
      # packages/game/package.json; action reads from there explicitly
      # because the repo has no root package.json (default lookup).
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: packages/game/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: packages/game/pnpm-lock.yaml

      # Install + build the game (regenerates tracks/manifest.json and
      # produces dist/game.bundle.min.js — one minified file containing
      # vendor libs + all game scripts).
      - name: Build game
        run: |
          cd packages/game
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Assemble _site/
        run: |
          mkdir -p _site
          # game at the root of pages — index.html, all *.js, sounds/,
          # tracks/, js/, plus dist/ with the bundle
          cp -r packages/game/. _site/
          # don't ship build/dev artifacts
          rm -rf _site/node_modules _site/package*.json _site/pnpm-lock.yaml \
                 _site/build-manifest.js _site/build.js _site/vite.config.js \
                 _site/.wrangler
          # analyzer at /analyzer/
          mkdir -p _site/analyzer
          cp -r packages/audio-analyzer/. _site/analyzer/
          rm -rf _site/analyzer/node_modules _site/analyzer/package*.json _site/analyzer/pnpm-lock.yaml

      # Replaces the literal "<!-- analytics -->" placeholder in both
      # index.html files with the snippet from ANALYTICS_SCRIPT (a repo-level
      # Variable, not a Secret — Cloudflare Insights doesn't care). If the
      # variable is empty/unset, the placeholder stays as a harmless comment.
      - name: Inject analytics
        env:
          ANALYTICS_SCRIPT: ${{ vars.ANALYTICS_SCRIPT }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const script = process.env.ANALYTICS_SCRIPT || '';
          if (!script) {
            console.log('ANALYTICS_SCRIPT not set, skipping injection');
            process.exit(0);
          }
          for (const path of ['_site/index.html', '_site/analyzer/index.html']) {
            const content = fs.readFileSync(path, 'utf8');
            fs.writeFileSync(path, content.replace('<!-- analytics -->', script));
            console.log('Analytics injected into', path);
          }
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
