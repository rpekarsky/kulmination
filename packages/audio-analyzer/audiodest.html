<!DOCTYPE HTML>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="bug"/>
<style type="text/css">

button{
	display: block;
	width: 100%;
	height: 40px;
}

</style>
</head>
<body>	
<script>

var context, audio, source, destination, analiser, loop, connect, frecData, log, logDOM, outputElementDOM, playButton, connectButton;

playButton = document.createElement('button');
playButton.textContent = 'play';
document.body.appendChild(playButton);


connectButton = document.createElement('button');
connectButton.textContent = 'connect';
document.body.appendChild(connectButton);

logDOM = document.createElement('pre');
document.body.appendChild(logDOM);

outputElementDOM = document.createElement('div'); document.body.appendChild(outputElementDOM);

context = new webkitAudioContext();
audio = new Audio();

log = function(str){
	logDOM.textContent = logDOM.textContent + str + '\n';
}


connect = function(){
	source = context.createMediaElementSource(audio);
	analiser = context.createAnalyser();
	destination = context.destination;
	frecData = new Uint8Array(analiser.frequencyBinCount);


	//connection
	source.connect(analiser);
	analiser.connect(destination);
	loop();
}

loop = function(){
	analiser.getByteFrequencyData(frecData);
  	var temp = '';
  	for (var i = 0; i < 10; i++) {
  		temp += frecData[i] + '\n';
  	};

  	outputElementDOM.textContent = temp;
	window.webkitRequestAnimationFrame(loop);
}



// if(audio.readyState < 3){
// 	audio.addEventListener('canplay', connect);
// } else {
// 	connect();
// }

audio.src = '/sdcard/Music/10. A Modern Myth.mp3';
// audio.src = '10. A Modern Myth.mp3';

connectButton.onclick = function(){
	log('connecting...');
	connect();
	log('connected');
}

playButton.onclick = function(){
	audio.play();
	log('play');
}

</script>
</body>
