<!DOCTYPE HTML>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kulmination — audio analyzer</title>
<!-- analytics -->
<style type="text/css">
	body {
		padding: 0;
		margin: 0;
		background: #111;
		color: #ccc;
		font-family: monospace;
	}
	canvas {
		background: #222;
		display: block;
		margin: 12px;
	}
	.overlay {
		position: fixed;
		bottom: 0; left: 0; right: 0;
		padding: 8px 14px;
		background: rgba(0,0,0,0.7);
		font-size: 11px;
		color: #888;
		display: flex;
		gap: 18px;
		align-items: center;
		flex-wrap: wrap;
		border-top: 1px solid #333;
	}
	.overlay .tracks a {
		color: #888;
		text-decoration: none;
		margin-right: 7px;
		border-bottom: 1px dotted #444;
	}
	.overlay .tracks a:hover  { color: #ddd; border-bottom-color: #888; }
	.overlay .tracks a.active { color: #fff; font-weight: bold; border-bottom-color: #fff; }
	.overlay .tracks a.silent { color: #555; }
	.overlay button {
		background: #222;
		color: #ddd;
		border: 1px solid #444;
		padding: 4px 10px;
		font-family: monospace;
		font-size: 11px;
		cursor: pointer;
	}
	.overlay button:disabled { opacity: 0.4; cursor: default; }
	.overlay button:hover:enabled { background: #333; }
	.overlay .status { color: #666; }
	.overlay input[type=file] { font-size: 11px; color: #aaa; }
	.overlay .vol { display: flex; align-items: center; gap: 6px; color: #aaa; }
	.overlay .vol input[type=range] { width: 80px; }
	#drop-overlay {
		display: none;
		position: fixed; inset: 0;
		background: rgba(0,100,200,0.25);
		border: 6px dashed rgba(255,255,255,0.55);
		z-index: 9999;
		pointer-events: none;
		font-family: monospace;
		font-size: 22px;
		color: #fff;
		text-shadow: 2px 2px 0 rgba(0,0,0,0.6);
		align-items: center;
		justify-content: center;
		text-align: center;
	}
	#drop-overlay.active { display: flex; }
	#drop-overlay span { padding: 12px 24px; background: rgba(0,0,0,0.55); border-radius: 6px; }
</style>
</head>
<body>
	<div id="drop-overlay"><span>drop an <strong>audio</strong> file (mp3/wav/ogg) anywhere to analyze</span></div>
	<canvas id="canvas" width='700' height='800'></canvas>

	<!-- Track selector — same list as packages/game/. Pick a track to analyze
	     (or drag-drop your own mp3 anywhere on the page). All sources are
	     freely-licensed Pixabay tracks bundled under tracks/. -->
	<script>
	var TRACKS = [
		{ id: 'alexguz-funk-breakbeat',       audio: 'tracks/alexguz-funk-amp-breakbeat-541097.mp3' },
		{ id: 'jumpingbunny-game-to-dance',   audio: 'tracks/jumpingbunny-game-to-dance-320448.mp3' },
		{ id: 'nveravetyanmusic-game-wave',   audio: 'tracks/nveravetyanmusic-game-wave-282615.mp3' },
		{ id: 'sunsides-rhythm-tribune',      audio: 'tracks/sunsides-rhythm-tribune-energetic-percussion-213183.mp3' },
		{ id: 'the-mountain-pop-rhythm',      audio: 'tracks/the_mountain-pop-rhythm-139501.mp3' }
	];
	var WORKING_AUDIO = {
		'tracks/alexguz-funk-amp-breakbeat-541097.mp3': true,
		'tracks/jumpingbunny-game-to-dance-320448.mp3': true,
		'tracks/nveravetyanmusic-game-wave-282615.mp3': true,
		'tracks/sunsides-rhythm-tribune-energetic-percussion-213183.mp3': true,
		'tracks/the_mountain-pop-rhythm-139501.mp3': true
	};
	var SELECTED_TRACK = (new URLSearchParams(location.search).get('track')) || TRACKS[0].id;
	var pickedTrack = TRACKS.find(function(t){ return t.id === SELECTED_TRACK; }) || TRACKS[0];
	SELECTED_TRACK = pickedTrack.id;
	window.TRACK_URL = pickedTrack.audio;
	</script>

	<script type="text/javascript" src="analysis.js"></script>

	<div class="overlay">
		<div class="tracks" id="track-list"></div>
		<label><input type="file" id="file-input" accept="audio/*"></label>
		<button id="play-btn" disabled>play</button>
		<button id="stop-btn" disabled>stop</button>
		<button id="analyze-btn" disabled>fast analyze (offline)</button>
		<button id="export-btn" disabled>export beats.js</button>
		<label class="vol">vol <input type="range" id="vol-slider" min="0" max="100"></label>
		<span class="status" id="status">loading…</span>
	</div>
	<script>
	(function(){
		var trackList = document.getElementById('track-list');
		TRACKS.forEach(function(t){
			var a = document.createElement('a');
			a.href = '?track=' + encodeURIComponent(t.id);
			a.textContent = t.id;
			if (t.id === SELECTED_TRACK) a.className = 'active';
			else if (!WORKING_AUDIO[t.audio]) a.className = 'silent';
			a.title = t.audio + (WORKING_AUDIO[t.audio] ? '' : '  (audio missing — would 404)');
			trackList.appendChild(a);
		});

		var playBtn    = document.getElementById('play-btn');
		var stopBtn    = document.getElementById('stop-btn');
		var analyzeBtn = document.getElementById('analyze-btn');
		var exportBtn  = document.getElementById('export-btn');
		var fileInput  = document.getElementById('file-input');
		var status     = document.getElementById('status');
		var lastAnalysis = null;        // populated by offline analyze; used by export
		var currentTrackName = SELECTED_TRACK;  // updated when user picks a local file

		window.addEventListener('audio-ready', function(){
			playBtn.disabled = false;
			analyzeBtn.disabled = false;
			status.textContent = 'ready: ' + (window.TRACK_URL || 'file');
		});
		window.addEventListener('audio-error', function(e){
			playBtn.disabled = true;
			analyzeBtn.disabled = true;
			status.textContent = 'load failed: ' + (e.detail || 'unknown');
		});

		playBtn.addEventListener('click', function(){
			if (context.state === 'suspended') context.resume();
			try { play(); } catch(err) { status.textContent = 'play error: ' + err.message; return; }
			stopBtn.disabled = false;
			exportBtn.disabled = true;     // realtime collection in progress
			status.textContent = 'playing (collecting beats in realtime)';
		});
		stopBtn.addEventListener('click', function(){
			try { stop(); } catch(err) {}
			stopBtn.disabled = true;
			lastAnalysis = {beats: detectedBeats.slice(), duration: (buffer && buffer.duration * 1000) || 0};
			if (lastAnalysis.beats.length) exportBtn.disabled = false;
			status.textContent = 'stopped (' + lastAnalysis.beats.length + ' beats)';
		});

		analyzeBtn.addEventListener('click', function(){
			analyzeBtn.disabled = true;
			exportBtn.disabled = true;
			status.textContent = 'analyzing 0%…';
			var t0 = performance.now();
			analyzeOffline(
				function(p){ status.textContent = 'analyzing ' + Math.floor(p * 100) + '%…'; },
				function(result){
					analyzeBtn.disabled = false;
					if (result.error) { status.textContent = 'analyze failed: ' + result.error; return; }
					lastAnalysis = result;
					var dt = ((performance.now() - t0) / 1000).toFixed(1);
					status.textContent = result.beats.length + ' beats, ' +
						(result.duration / 1000).toFixed(1) + 's track, analyzed in ' + dt + 's';
					exportBtn.disabled = false;
				}
			);
		});

		exportBtn.addEventListener('click', function(){
			if (!lastAnalysis || !lastAnalysis.beats.length) return;
			var name = prompt('Track name (used as <name>_beats.js):', currentTrackName || 'track');
			if (!name) return;
			var src;
			if (currentTrackName === SELECTED_TRACK) {
				// Picked from TRACKS list — use its known audio path.
				src = TRACKS.find(function(t){return t.id === SELECTED_TRACK;}).audio;
			} else {
				// User dropped/picked a file. Game looks for audio under tracks/,
				// so write that path here so the exported _beats.js is consistent
				// even if the game side didn't override musicSrc.
				src = 'tracks/' + currentTrackName + '.mp3';
			}
			var content =
				'var beats = ' + JSON.stringify(lastAnalysis.beats) + ';\n\n' +
				'var duration = Math.floor(' + (lastAnalysis.duration / 1000) + '*1000);\n\n' +
				'var musicSrc = ' + JSON.stringify(src) + ';\n';
			var blob = new Blob([content], {type: 'text/javascript'});
			var url = URL.createObjectURL(blob);
			var a = document.createElement('a');
			a.href = url;
			a.download = name + '_beats.js';
			document.body.appendChild(a);
			a.click();
			document.body.removeChild(a);
			URL.revokeObjectURL(url);
		});

		// Volume slider — drives gainNode (defined in analysis.js), persists in localStorage.
		var volSlider = document.getElementById('vol-slider');
		var savedVol = parseInt(localStorage.getItem('analyzer-vol') || '50', 10);
		volSlider.value = String(savedVol);
		if (typeof gainNode !== 'undefined') gainNode.gain.value = savedVol / 100;
		volSlider.addEventListener('input', function(e){
			var v = parseInt(e.target.value, 10);
			if (typeof gainNode !== 'undefined') gainNode.gain.value = v / 100;
			localStorage.setItem('analyzer-vol', String(v));
		});
		volSlider.addEventListener('keydown', function(e){ e.stopPropagation(); });

		function loadAudioFile(file){
			window.TRACK_URL = URL.createObjectURL(file);
			currentTrackName = file.name.replace(/\.[^.]+$/, '');  // strip extension
			status.textContent = 'loading ' + file.name + '…';
			playBtn.disabled = true;
			stopBtn.disabled = true;
			analyzeBtn.disabled = true;
			exportBtn.disabled = true;
			loadSoundFile(window.TRACK_URL);
		}

		// File input: load any local audio file via a blob URL.
		fileInput.addEventListener('change', function(e){
			var file = e.target.files[0];
			if (!file) return;
			loadAudioFile(file);
		});

		// Drag-and-drop anywhere on the page (audio files only — analyzer doesn't
		// consume beats files, it produces them).
		var dropOverlay = document.getElementById('drop-overlay');
		var dragDepth = 0;
		function isAudioFile(n){ return /\.(mp3|ogg|wav|m4a|flac|aac)$/i.test(n); }
		document.addEventListener('dragenter', function(e){
			e.preventDefault();
			dragDepth++;
			dropOverlay.classList.add('active');
		});
		document.addEventListener('dragleave', function(){
			dragDepth--;
			if (dragDepth <= 0) { dragDepth = 0; dropOverlay.classList.remove('active'); }
		});
		document.addEventListener('dragover', function(e){ e.preventDefault(); });
		document.addEventListener('drop', function(e){
			e.preventDefault();
			dragDepth = 0;
			dropOverlay.classList.remove('active');
			var files = Array.from(e.dataTransfer.files || []);
			var audio = files.find(function(f){ return isAudioFile(f.name); });
			if (!audio) {
				status.textContent = 'drop an audio file (.mp3/.wav/.ogg)';
				return;
			}
			loadAudioFile(audio);
		});
	})();
	</script>
</body>
</html>
