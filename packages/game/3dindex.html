<!DOCTYPE HTML>
<html>
	<head>
		<title>My first Three.js app</title>
		<style>canvas { width: 100%; height: 100% }</style>
	</head>
	<body>
		<script src="js/three.min.js"></script>
		<script>
			var scene = new THREE.Scene();
			var camera = new THREE.PerspectiveCamera(75, 640/480, 0.1, 1000);

			var renderer = new THREE.WebGLRenderer({antialias:false});
			renderer.setSize(640, 480);
			document.body.appendChild(renderer.domElement);

			var geometry = new THREE.RingGeometry(1, 1, 6);
			var material = new THREE.MeshBasicMaterial({
				color: 0x707030,
				wireframe:true});
			var cube = new THREE.Mesh(geometry, material);
			scene.add(cube);

			var hemi = new THREE.AmbientLight(0x00ffff);
			scene.add(hemi);

			camera.position.z = 5;

			var render = function () {
				requestAnimationFrame(render);

				// cube.rotation.x += 0.01;
				// cube.rotation.y += 0.01;
				camera.position.z = Math.sin(Date.now()/1000)*20+20;
				// camera.rotation.x = Math.sin(Date.now()/1000)*3.14/2;

				renderer.render(scene, camera);
			};

			render();


			var Section = (function(){
				function Section(x,y,z){
					this._renderObject = new THREE.Mesh(new THREE.RingGeometry(1, 1, 6),material);
					this._renderObject.position.x = x;
					this._renderObject.position.y = y;
					this._renderObject.position.z = z;
					scene.add(this._renderObject);
				}
				var p = Section.prototype;
				return Section;
			})()

			var xoff = 0;
			var yoff = 0;
			var off = 0.4;
			for (var i = 0; i < 20; i++) {
				new Section(xoff,yoff,i);
				xoff+= Math.random()*off*2 -off;
				yoff+= Math.random()*off*2 -off;
			};
		</script>
	</body>
</html>
