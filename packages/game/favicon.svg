<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
	<!-- Pixel-art "K9n" in IBM VGA spirit. Black field, white glyphs, 1px strokes
	     for max legibility at favicon scale (16/32 px tab renders). -->
	<rect width="16" height="16" fill="#000"/>
	<g fill="#fff">
		<!-- K  (cols 1-5, rows 4-10) -->
		<rect x="1" y="4"  width="1" height="1"/><rect x="5" y="4"  width="1" height="1"/>
		<rect x="1" y="5"  width="1" height="1"/><rect x="4" y="5"  width="1" height="1"/>
		<rect x="1" y="6"  width="1" height="1"/><rect x="3" y="6"  width="1" height="1"/>
		<rect x="1" y="7"  width="1" height="1"/><rect x="2" y="7"  width="1" height="1"/>
		<rect x="1" y="8"  width="1" height="1"/><rect x="3" y="8"  width="1" height="1"/>
		<rect x="1" y="9"  width="1" height="1"/><rect x="4" y="9"  width="1" height="1"/>
		<rect x="1" y="10" width="1" height="1"/><rect x="5" y="10" width="1" height="1"/>

		<!-- 9  (cols 6-10, rows 4-10) -->
		<rect x="7" y="4"  width="3" height="1"/>
		<rect x="6" y="5"  width="1" height="1"/><rect x="10" y="5" width="1" height="1"/>
		<rect x="6" y="6"  width="1" height="1"/><rect x="10" y="6" width="1" height="1"/>
		<rect x="7" y="7"  width="4" height="1"/>
		<rect x="10" y="8"  width="1" height="1"/>
		<rect x="10" y="9"  width="1" height="1"/>
		<rect x="7" y="10" width="4" height="1"/>

		<!-- n  (cols 12-15, rows 6-10 — lowercase, sits on baseline) -->
		<rect x="12" y="6"  width="4" height="1"/>
		<rect x="12" y="7"  width="1" height="1"/><rect x="15" y="7"  width="1" height="1"/>
		<rect x="12" y="8"  width="1" height="1"/><rect x="15" y="8"  width="1" height="1"/>
		<rect x="12" y="9"  width="1" height="1"/><rect x="15" y="9"  width="1" height="1"/>
		<rect x="12" y="10" width="1" height="1"/><rect x="15" y="10" width="1" height="1"/>
	</g>
</svg>
