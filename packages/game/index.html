<style type="text/css">
	/* Font: Oldschool PC Font Pack by VileR (CC BY-SA 4.0)
	   https://int10h.org/oldschool-pc-fonts/  —  IBM VGA 8x16 Plus variant
	   with extended (Cyrillic-capable) charset for Audius track titles. */
	@font-face {
		font-family: 'IBM VGA 8x16';
		src: url('fonts/WebPlus_IBM_VGA_8x16.woff') format('woff');
		font-display: swap;
	}

	/* CRT TUI palette — strict monochrome on a light glass surface.
	   Panels are translucent + blurred (almost-white over the dark game
	   canvas); text and borders go dark. Heavy modals (loading-overlay)
	   stay dark and override to light text locally. Score-hud over the
	   raw canvas keeps its own explicit white styling. */
	:root {
		--bg-panel:    rgba(255,255,255,0.06);
		--bg-input:    rgba(0,0,0,0.18);
		--bg-drop:     rgba(255,255,255,0.12);
		--bg-modal:    rgba(0,0,0,0.7);

		--border:      rgba(0,0,0,0.32);
		--border-hot:  rgba(0,0,0,0.65);
		--border-dash: rgba(0,0,0,0.32);

		--fg:          #222;
		--fg-bright:   #000;
		--fg-muted:    #555;
		--fg-dim:      #888;

		--warn:        #000;
		--warn-bg:     rgba(255,200,40,0.30);
		--warn-bd:     rgba(0,0,0,0.55);

		--info:        #000;
		--info-bg:     rgba(120,200,255,0.30);
		--info-bd:     rgba(0,0,0,0.55);

		--error:       #000;
		--accent:      #000;       /* custom-replayable rows (italic in CSS) */

		--radius:      2px;
		--ui-scale:    1.2;        /* scales system UI font sizes; score-hud excluded */
	}

	body {
		padding: 0;
		margin: 0;
		background: #000;
		color: var(--fg);
		font-family: 'IBM VGA 8x16', monospace;
	}
	canvas { display: block; }

	/* Single HUD overlay — best (top-left), score (center), multiplier+streak
	   (right). One rotation transform applied to #game-hud in loop.js tilts
	   the whole sheet together (tachometer-style). 8-way pixel outline +
	   hard drop shadow is inherited by all children. */
	#game-hud {
		position: fixed;
		bottom: 24px;
		left: 50%;
		transform: translateX(-50%);
		/* Pivot the whole-HUD rotation from roughly screen-center instead of
		   the HUD's own center. Tachometer-on-a-dashboard feel: bank-left
		   swings the HUD like it's mounted to a point above. */
		transform-origin: 50% -50vh;
		width: 500px;
		max-width: 90vw;
		display: flex;
		justify-content: space-between;
		align-items: flex-end;
		z-index: 105;
		pointer-events: none;
		color: white;
		font-family: 'IBM VGA 8x16', monospace;
		text-shadow:
			-1px -1px 0 #000,  0 -1px 0 #000,  1px -1px 0 #000,
			-1px  0   0 #000,                  1px  0   0 #000,
			-1px  1px 0 #000,  0  1px 0 #000,  1px  1px 0 #000,
			 2px  3px 0 rgba(0,0,0,0.85);
	}
	#game-hud .hud-col { display: flex; flex-direction: column; }
	#game-hud .hud-left   { text-align: left;   align-items: flex-start; }
	#game-hud .hud-center { text-align: center; align-items: center; flex: 1; }
	#game-hud .hud-right  { text-align: right;  align-items: flex-end;  }
	#hud-best       { font-size: 14pt; opacity: 0.7; line-height: 1; }
	#hud-score      { font-size: 32pt; line-height: 1; transform-origin: center bottom; }
	#hud-multiplier { font-size: 32pt; line-height: 1; transform-origin: right center; }
	#hud-streak     { font-size: 24pt; line-height: 1; transform-origin: right center; margin-top: 4px; }

	#hint {
		padding: 12px 18px;
		background: rgba(255,255,255,0.06);
		backdrop-filter: blur(10px);
		-webkit-backdrop-filter: blur(10px);
		border: 1px solid var(--border);
		border-radius: var(--radius);
		font-size: calc(13px * var(--ui-scale));
		color: var(--fg);
		text-align: center;
		box-sizing: border-box;
		flex: 0 1 500px;
		min-width: 280px;
	}
	#hint.hidden { display: none; }
	#hint h1 { margin: 0 0 8px; font-size: calc(18px * var(--ui-scale)); letter-spacing: 2px; color: var(--fg-bright); }
	#hint .sub { color: var(--fg-muted); font-size: calc(11px * var(--ui-scale)); margin-top: 6px; }
	#hint a { color: var(--info); }
	#hint #track-list {
		display: flex; flex-direction: column;
		text-align: left;
		margin: 6px 0;
		max-height: 154px;
		overflow-y: auto;
		border: 1px solid var(--border);
		border-radius: var(--radius);
		padding: 4px 8px;
		line-height: 1.4;
	}
	#hint #track-list .item {
		display: flex;
		justify-content: space-between;
		gap: 12px;
		padding: 0;
	}
	#hint #track-list .item .name {
		overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
		flex: 1 1 auto; min-width: 0;
	}
	#hint #track-list .item .score {
		color: var(--fg-muted); font-variant-numeric: tabular-nums; flex: 0 0 auto;
	}
	#hint #track-list .item.bundled .name {
		color: var(--fg); cursor: pointer;
		border-bottom: 1px dotted transparent;
	}
	#hint #track-list .item.bundled .name:hover { color: var(--fg-bright); border-bottom-color: var(--fg-muted); }
	#hint #track-list .item.bundled.active .name { color: var(--fg-bright); }
	#hint #track-list .item.custom { opacity: 0.85; }
	#hint #track-list .item.custom .name { color: var(--fg-muted); font-style: italic; cursor: default; }
	#hint #track-list .item .clear {
		cursor: pointer; padding: 0 4px; user-select: none; flex: 0 0 auto;
		color: var(--fg-muted);
	}
	#hint #track-list .item.bundled.active .clear { color: var(--fg-bright); }
	#hint #track-list .item .clear:hover          { color: var(--error); }
	#hint #track-list .empty { color: var(--fg-muted); padding: 4px 0; font-style: italic; }
	#hint #track-list.hidden { display: none; }
	#hint #track-list .item.custom.replayable { opacity: 1; }
	#hint #track-list .item.custom.replayable .name {
		font-style: normal; cursor: pointer; color: var(--accent);
		border-bottom: 1px dotted transparent;
	}
	#hint #track-list .item.custom.replayable .name:hover { color: var(--fg-bright); border-bottom-color: var(--accent); }
	#hint #track-list .item .ext {
		color: var(--info); text-decoration: none; flex: 0 0 auto; padding: 0 2px;
	}
	#hint #track-list .item .ext:hover { color: var(--fg-bright); }

	#share-prompt {
		margin: 0 0 8px;
		padding: 10px 14px;
		background: var(--info-bg);
		border: 1px solid var(--info-bd);
		border-radius: var(--radius);
		color: var(--info);
		font-size: calc(13px * var(--ui-scale));
		text-align: center;
		cursor: pointer;
		user-select: none;
	}
	#share-prompt:hover { background: rgba(80,180,255,0.25); color: var(--fg-bright); }
	#share-prompt.hidden { display: none; }

	.search-row {
		display: flex;
		gap: 6px;
		margin: 8px 0 4px;
	}
	#search-engine,
	#track-search {
		background: var(--bg-input);
		border: 1px solid var(--border);
		border-radius: var(--radius);
		color: var(--fg);
		font-family: 'IBM VGA 8x16', monospace;
		font-size: calc(12px * var(--ui-scale));
		padding: 6px 8px;
	}
	#search-engine { flex: 0 0 auto; cursor: pointer; }
	#track-search  { flex: 1 1 auto; min-width: 0; box-sizing: border-box; }
	#search-engine:focus,
	#track-search:focus { outline: none; border-color: var(--border-hot); }
	#track-search::placeholder { color: var(--fg-muted); }

	#hint #search-results {
		text-align: left;
		max-height: 154px;
		overflow-y: auto;
		font-size: calc(12px * var(--ui-scale));
		line-height: 1.4;
	}
	#hint #search-results .search-header {
		color: var(--fg-muted);
		font-size: calc(10px * var(--ui-scale));
		padding: 6px 4px 2px;
		text-transform: uppercase;
		letter-spacing: 0.6px;
		border-top: 1px dashed var(--border-dash);
		margin-top: 4px;
	}
	#hint #search-results .search-status {
		color: var(--fg-muted); font-size: calc(11px * var(--ui-scale)); padding: 6px 4px; font-style: italic;
	}
	#hint #search-results .search-status.error { color: var(--error); }
	#hint #search-results .item {
		display: flex; gap: 8px;
		padding: 1px 4px;
	}
	#hint #search-results .item .name {
		flex: 1 1 auto; min-width: 0;
		overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
		color: var(--accent); cursor: pointer;
		border-bottom: 1px dotted transparent;
	}
	#hint #search-results .item .name:hover { color: var(--fg-bright); border-bottom-color: var(--accent); }
	#hint #search-results .item .duration {
		color: var(--fg-dim); font-variant-numeric: tabular-nums; flex: 0 0 auto;
	}
	#hint #search-results .item .ext {
		color: var(--info); text-decoration: none; flex: 0 0 auto; padding: 0 2px;
	}
	#hint #search-results .item .ext:hover { color: var(--fg-bright); }

	.overlay {
		position: fixed;
		top: 0; left: 0; right: 0;
		padding: 8px 14px;
		background: rgba(255,255,255,0.06);
		backdrop-filter: blur(6px);
		-webkit-backdrop-filter: blur(6px);
		border-bottom: 1px solid var(--border);
		z-index: 100;
		font-size: calc(11px * var(--ui-scale));
		color: var(--fg-muted);
		display: flex;
		gap: 14px;
		align-items: center;
		flex-wrap: wrap;
	}
	.overlay .cover {
		flex: 0 0 auto;
		width: 32px; height: 32px;
		object-fit: cover;
		border: 1px solid var(--border);
	}
	.overlay .cover.hidden { display: none; }
	.overlay .info { color: var(--fg); }
	.overlay .time {
		color: var(--fg-muted);
		font-variant-numeric: tabular-nums;
		letter-spacing: 0.5px;
	}
	.overlay .time.hidden { display: none; }
	.overlay .vol {
		display: flex; align-items: center; gap: 6px;
		color: var(--fg-muted);
	}
	.overlay .vol-label {
		cursor: pointer;
		user-select: none;
		padding: 2px 4px;
		border-radius: var(--radius);
	}
	.overlay .vol-label:hover { color: var(--fg-bright); }
	.overlay .vol-label.muted {
		text-decoration: line-through;
		color: var(--fg-dim);
	}
	.overlay .vol input[type=range] { width: 80px; }
	.overlay .share {
		background: var(--bg-input);
		border: 1px solid var(--border);
		border-radius: var(--radius);
		color: var(--fg);
		font-family: 'IBM VGA 8x16', monospace;
		font-size: calc(11px * var(--ui-scale));
		padding: 3px 8px;
		cursor: pointer;
	}
	.overlay .share:hover { color: var(--fg-bright); border-color: var(--border-hot); }
	.overlay .share.hidden { display: none; }

	#drop-overlay {
		display: none;
		position: fixed; inset: 0;
		background: var(--bg-drop);
		border: 4px dashed rgba(255,255,255,0.55);
		z-index: 9999;
		pointer-events: none;
		font-size: calc(22px * var(--ui-scale));
		color: #fff;
		text-shadow: 2px 2px 0 rgba(0,0,0,0.6);
		align-items: center;
		justify-content: center;
		text-align: center;
	}
	#drop-overlay.active { display: flex; }
	#drop-overlay span { padding: 12px 24px; background: rgba(0,0,0,0.55); border-radius: var(--radius); }

	#loading-overlay {
		display: none;
		position: fixed; inset: 0;
		background: var(--bg-modal);
		z-index: 9998;
		align-items: center;
		justify-content: center;
		color: #fff;
		font-family: 'IBM VGA 8x16', monospace;
		font-size: calc(16px * var(--ui-scale));
	}
	body.loading #loading-overlay { display: flex; }
	body.loading #loading-overlay span {
		padding: 12px 24px;
		background: rgba(0,0,0,0.55);
		border-radius: var(--radius);
	}

	/* Ghost-runner nickname labels — floating HTML over the 3D scene,
	   re-positioned every frame by ghosts.js via mainCamera projection.
	   Pointer-events off so they never steal canvas clicks. */
	.ghost-label {
		position: fixed;
		left: 0; top: 0;
		transform: translate(-50%, -100%);
		color: #fff;
		font-family: 'IBM VGA 8x16', monospace;
		font-size: 11px;
		letter-spacing: 1px;
		pointer-events: none;
		white-space: nowrap;
		/* Top+bottom outline only — lighter weight than full 8-way,
		   still readable against the tube without a solid backdrop. */
		text-shadow: 0 -1px 0 #000, 0 1px 0 #000;
		z-index: 90;
	}

	/* Menu overlay — CSS grid with auto-fit columns. Each column is
	   bounded 320px..480px wide; the grid fits as many as can hold their
	   minimum and wraps the rest. justify-content:center keeps wrapped
	   rows visually anchored. Top padding clears the .overlay top bar
	   (≈48px tall) so panels don't crowd the cover/volume/share controls. */
	#menu-overlay {
		position: fixed;
		inset: 0;
		display: grid;
		grid-template-columns: repeat(auto-fit, minmax(320px, 480px));
		gap: 16px;
		justify-content: center;
		align-content: start;
		padding: 68px 16px 16px;
		box-sizing: border-box;
		z-index: 105;
		pointer-events: none;
		overflow-y: auto;
	}
	#menu-overlay > * { pointer-events: auto; }

	/* The left column stacks recent + most-played as a single grid item.
	   Hide the column entirely when all children are hidden so it
	   surrenders its grid slot instead of leaving a gap. */
	.menu-col {
		display: none;
		flex-direction: column;
		gap: 16px;
	}
	.menu-col:has(> :not(.hidden)) { display: flex; }

	/* Panel visual = same CRT-glass language as #hint. */
	#leaderboard-panel,
	#recent-panel,
	#most-played-panel {
		padding: 14px 18px;
		background: var(--bg-panel);
		backdrop-filter: blur(10px);
		-webkit-backdrop-filter: blur(10px);
		border: 1px solid var(--border);
		border-radius: var(--radius);
		font-size: calc(12px * var(--ui-scale));
		color: var(--fg);
		box-sizing: border-box;
	}
	#leaderboard-panel.hidden,
	#recent-panel.hidden,
	#most-played-panel.hidden { display: none; }

	/* Eyebrow-style label for the feed panels — small uppercase letter-
	   spaced caption sitting above the list. Lets the list content
	   itself carry the visual weight. */
	.panel-eyebrow {
		margin: 0 0 8px;
		font-size: calc(10px * var(--ui-scale));
		letter-spacing: 3px;
		color: var(--fg-muted);
		text-align: center;
	}

	/* The track title is the panel header — no separate <h1>. */
	#leaderboard-panel .lb-track {
		text-align: center;
		color: var(--fg-bright);
		margin: 0 0 12px;
		font-size: calc(14px * var(--ui-scale));
		line-height: 1.2;
		overflow: hidden;
		text-overflow: ellipsis;
		white-space: nowrap;
	}
	#leaderboard-panel .lb-track .lb-artist {
		color: var(--fg-muted);
		font-size: calc(11px * var(--ui-scale));
	}

	#leaderboard-panel .lb-rows {
		display: flex; flex-direction: column;
		border: 1px solid var(--border);
		border-radius: var(--radius);
		padding: 4px 8px;
		line-height: 1.5;
		margin-bottom: 10px;
		max-height: 60vh;
		overflow-y: auto;
	}
	#leaderboard-panel .lb-row {
		display: grid;
		grid-template-columns: 28px 1fr auto;
		gap: 8px;
		align-items: center;
	}
	#leaderboard-panel .lb-row-self { background: var(--bg-input); }
	#leaderboard-panel .lb-rank  { color: var(--fg-muted); text-align: right; }
	#leaderboard-panel .lb-nick  { color: var(--fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
	#leaderboard-panel .lb-score { color: var(--fg-bright); font-variant-numeric: tabular-nums; text-align: right; }
	#leaderboard-panel .lb-sep   { text-align: center; color: var(--fg-dim); padding: 2px 0; }

	#leaderboard-panel .lb-nick-input {
		background: transparent;
		border: none;
		border-bottom: 1px solid var(--border-hot);
		color: var(--fg-bright);
		font-family: inherit;
		font-size: inherit;
		padding: 0 2px;
		outline: none;
		width: 100%;
		min-width: 0;
	}
	#leaderboard-panel .lb-nick-input:focus { border-bottom-color: var(--fg-bright); }

	#leaderboard-panel .lb-actions {
		display: flex; gap: 8px; justify-content: center;
	}
	#leaderboard-panel .lb-actions button {
		background: var(--bg-input);
		color: var(--fg-bright);
		border: 1px solid var(--border);
		border-radius: var(--radius);
		padding: 6px 14px;
		font-family: inherit;
		font-size: inherit;
		cursor: pointer;
		letter-spacing: 1px;
	}
	#leaderboard-panel .lb-actions button:hover:not(:disabled) {
		border-color: var(--border-hot);
		background: var(--bg-drop);
	}
	#leaderboard-panel .lb-actions button:disabled {
		opacity: 0.5;
		cursor: default;
	}
	#leaderboard-panel .lb-loading { text-align: center; color: var(--fg-muted); padding: 20px 0; }
	#leaderboard-panel .lb-error {
		color: var(--error);
		text-align: center;
		font-size: calc(10px * var(--ui-scale));
		margin-top: 8px;
		min-height: 1em;
	}

	#recent-panel .feed-rows,
	#most-played-panel .feed-rows {
		display: flex; flex-direction: column;
		gap: 8px;
		max-height: 380px;
		overflow-y: auto;
	}
	#recent-panel .feed-row,
	#most-played-panel .feed-row {
		cursor: pointer;
		padding: 4px 6px;
		border-radius: var(--radius);
		border: 1px solid transparent;
	}
	#recent-panel .feed-row:hover,
	#most-played-panel .feed-row:hover {
		border-color: var(--border);
		background: var(--bg-drop);
	}
	#recent-panel .feed-title,
	#most-played-panel .feed-title {
		color: var(--fg-bright);
		overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
	}
	#recent-panel .feed-artist,
	#most-played-panel .feed-artist {
		color: var(--fg-muted);
		font-size: calc(10px * var(--ui-scale));
		overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
	}
	#recent-panel .feed-meta,
	#most-played-panel .feed-meta {
		color: var(--fg-dim);
		font-size: calc(10px * var(--ui-scale));
		text-align: right;
	}

	/* Play prompt — full-screen modal between track-loaded and audio-
	   playing. The click on .play-btn (or anywhere on the prompt) is the
	   user-gesture that authorizes MPlayer.audio.play(). */
	#play-prompt {
		position: fixed;
		inset: 0;
		display: flex;
		flex-direction: column;
		align-items: center;
		justify-content: center;
		gap: 6px;
		background: rgba(0,0,0,0.55);
		backdrop-filter: blur(8px);
		-webkit-backdrop-filter: blur(8px);
		z-index: 200;
		cursor: pointer;
		font-family: 'IBM VGA 8x16', monospace;
	}
	#play-prompt.hidden { display: none; }
	#play-prompt .play-title {
		color: #fff;
		font-size: calc(22px * var(--ui-scale));
		letter-spacing: 2px;
		text-align: center;
		max-width: 80vw;

	}

</style>
</head>
<body>
	<div id="menu-overlay">
		<div class="menu-col">
			<div id="recent-panel" class="hidden"></div>
			<div id="most-played-panel" class="hidden"></div>
		</div>
		<div id="hint">
			<h1>Kulmination (Prototype)</h1>
			<div id="share-prompt" class="hidden"></div>
			<div class="search-row">
				<select id="search-engine" title="search engine"></select>
				<input id="track-search" type="search" placeholder="search Audius…" autocomplete="off" spellcheck="false">
			</div>
			<div id="search-results"></div>
			<div id="track-list">loading tracks…</div>
			<div class="sub">controls: A / D &middot; ← → &middot; touch &amp; drag</div>
			<div class="sub">or drop your music &middot; <a href="https://github.com/rpekarsky/kulmination" target="_blank" rel="noopener">source on github</a></div>
		</div>
		<div class="menu-col">
			<div id="leaderboard-panel" class="hidden"></div>
		</div>
	</div>

	<div id="game-hud">
		<div class="hud-col hud-left">
			<div id="hud-best"></div>
		</div>
		<div class="hud-col hud-center">
			<div id="hud-score">0</div>
		</div>
		<div class="hud-col hud-right">
			<div id="hud-multiplier">x1</div>
			<div id="hud-streak">0</div>
		</div>
	</div>

	<div id="drop-overlay"><span>drop <strong>audio</strong> (.mp3/.wav/.ogg) — beats are analyzed on the fly</span></div>
	<div id="loading-overlay"><span>loading…</span></div>

	<div class="overlay" id="game-overlay">
		<img class="cover hidden" id="cover-art" alt="">
		<span class="info" id="info"></span>
		<span class="time hidden" id="time-display"></span>
		<button class="share hidden" id="share-btn" title="copy share link">share</button>
		<span class="vol">
			<span class="vol-label" data-channel="music" title="click to mute">music</span>
			<input type="range" id="vol-slider" min="0" max="100">
		</span>
		<span class="vol">
			<span class="vol-label" data-channel="sfx" title="click to mute">sfx</span>
			<input type="range" id="sfx-slider" min="0" max="100">
		</span>
		<button class="share" id="ghosts-toggle" title="show/hide ghost runners">toggle ghosts (on)</button>
	</div>

	<!-- Play prompt — appears after a track finishes loading + analyzing,
	     before audio actually starts. Click anywhere starts playback;
	     this click IS the user-gesture token that grants autoplay
	     permission, which is why we no longer pre-prime audio. -->
	<div id="play-prompt" class="hidden">
		<div class="play-title"></div>
		<div class="play-artist"></div>
		<button class="play-btn">▶ play</button>
	</div>

	<!-- Boot-time script order — single source of truth for both the
	     fallback waterfall below and packages/game/build.js for the
	     production bundle. Defines window.GAME_SCRIPTS. -->
	<script src="game-scripts.js"></script>

	<script>
	// Bootstrap.
	//
	// Page load:
	//   - boots in PREVIEW with empty beats + 60s dummy duration + no audio.
	//   - mainloop runs camera + player only, no obstacles, no audio.
	//   - user sees the tube/plane idling as a screensaver.
	//
	// Script loading:
	//   - Try dist/game.bundle.min.js (single minified bundle of vendor +
	//     all game files, built by `npm run build`).
	//   - On 404 (no bundle), fall back to loading each file in
	//     GAME_SCRIPTS one-by-one in order — the dev path.
	//
	// Drop (preview OR mid-play):
	//   - audio gets a Blob URL (lives in memory, no 5MB cap)
	//   - beats text is inlined into a new <script>, redefining the window
	//     globals beats / duration / musicSrc
	//   - swap() tears down the preview/old scene meshes, re-injects tube.js
	//     to rebuild the spline against the new duration, then calls
	//     loadBeats() + addPlates() to repopulate
	//   - new audio src is set on MPlayer.audio, PREVIEW flag cleared, play.
	//   - no sessionStorage, no location.reload.
	(function(){

		var PREVIEW_BEATS_TEXT = 'var beats = []; var duration = 60000; var musicSrc = "";';

		var infoEl      = document.getElementById('info');
		var hintEl      = document.getElementById('hint');
		var dropOverlay = document.getElementById('drop-overlay');
		var trackListEl = document.getElementById('track-list');
		var coverEl     = document.getElementById('cover-art');
		var timeEl      = document.getElementById('time-display');

		function setCover(url){
			if (!url) { clearCover(); return; }
			coverEl.src = url;
			coverEl.classList.remove('hidden');
		}
		function clearCover(){
			coverEl.removeAttribute('src');
			coverEl.classList.add('hidden');
		}

		function formatTime(s){
			s = Math.max(0, Math.floor(s));
			var m = Math.floor(s / 60);
			var sec = s % 60;
			return m + ':' + (sec < 10 ? '0' : '') + sec;
		}
		function updateTimeDisplay(){
			if (window.PREVIEW) { timeEl.classList.add('hidden'); return; }
			var dur = isFinite(MPlayer.audio.duration) ? MPlayer.audio.duration : 0;
			timeEl.textContent = formatTime(MPlayer.audio.currentTime || 0) + ' / ' + formatTime(dur);
			timeEl.classList.remove('hidden');
		}
		function wireTimeDisplay(){
			MPlayer.audio.addEventListener('timeupdate',     updateTimeDisplay);
			MPlayer.audio.addEventListener('loadedmetadata', updateTimeDisplay);
			MPlayer.audio.addEventListener('play',           updateTimeDisplay);
		}

		// Render-scale — buffer at (viewport / scale), canvas CSS at full
		// viewport, image-rendering: pixelated when scale > 1. Default 1×
		// (full-resolution render). The UI slider was removed but the
		// override path stays: set `kulm_render_scale_v2` in localStorage
		// to 2..6 and refresh for chunky-pixel mode.
		//
		// Key bumped from `kulm_render_scale` to `_v2` so users who had a
		// stale 3× saved from the old UI fall back to the new default.
		var RENDER_SCALE_KEY = 'kulm_render_scale_v2';
		function applyRenderScale(scale){
			scale = Math.max(1, Math.min(6, scale | 0));
			var w = Math.floor(window.innerWidth  / scale);
			var h = Math.floor(window.innerHeight / scale);
			window.renderer.setSize(w, h, false);
			window.renderer.domElement.style.width  = '100vw';
			window.renderer.domElement.style.height = '100vh';
			window.renderer.domElement.style.imageRendering = scale > 1 ? 'pixelated' : 'auto';
			if (window.camera)  { window.camera.aspect  = window.innerWidth / window.innerHeight; window.camera.updateProjectionMatrix(); }
			if (window.camera2) { window.camera2.aspect = window.innerWidth / window.innerHeight; window.camera2.updateProjectionMatrix(); }
		}
		function wireRenderScale(){
			applyRenderScale(parseInt(localStorage.getItem(RENDER_SCALE_KEY) || '1', 10));
			window.addEventListener('resize', function(){
				applyRenderScale(parseInt(localStorage.getItem(RENDER_SCALE_KEY) || '1', 10));
			});
		}

		// Show the play-prompt with the track meta. Any click on the
		// overlay (including the explicit [play] button) hides the prompt
		// and invokes onPlay() — the click is the user-gesture that
		// authorizes MPlayer.audio.play(). Enter / Space also trigger.
		function showPlayPrompt(title, artist, onPlay){
			var el     = document.getElementById('play-prompt');
			var titleE = el.querySelector('.play-title');
			var artE   = el.querySelector('.play-artist');
			var btn    = el.querySelector('.play-btn');
			titleE.textContent = title || '';
			artE.textContent   = artist || '';
			el.classList.remove('hidden');
			btn.focus();

			function trigger(e){
				if (e && e.preventDefault) e.preventDefault();
				el.classList.add('hidden');
				el.removeEventListener('click',   trigger);
				document.removeEventListener('keydown', onKey);
				onPlay();
			}
			function onKey(e){
				if (e.key === 'Enter' || e.key === ' ') trigger(e);
			}
			el.addEventListener('click', trigger);
			document.addEventListener('keydown', onKey);
		}

		// Ghosts visibility toggle in the top overlay. Persisted in
		// localStorage so the choice survives across sessions.
		var GHOSTS_VISIBLE_KEY = 'kulm_show_ghosts';
		function wireGhostsToggle(){
			var el = document.getElementById('ghosts-toggle');
			if (!el) return;
			var on = localStorage.getItem(GHOSTS_VISIBLE_KEY) !== '0';
			function render(){ el.textContent = 'toggle ghosts (' + (on ? 'on' : 'off') + ')'; }
			render();
			if (typeof Ghosts !== 'undefined') Ghosts.setVisible(on);
			el.addEventListener('click', function(){
				on = !on;
				localStorage.setItem(GHOSTS_VISIBLE_KEY, on ? '1' : '0');
				render();
				if (typeof Ghosts !== 'undefined') Ghosts.setVisible(on);
			});
		}

		var presets        = [];        // manifest entries [{id, audio, beats}]
		var activeTrackId  = null;      // currently playing preset id (null = preview or custom drop)
		var currentAudioUrl = null;     // for revoking previous Blob URL on swap

		function enterGameState(){
			hintEl.classList.add('hidden');
			if (typeof LeaderboardUI !== 'undefined') LeaderboardUI.hideFeeds();
		}
		function exitGameState(){
			hintEl.classList.remove('hidden');
			timeEl.classList.add('hidden');
			clearCover();
			renderTrackList();
			if (typeof LeaderboardUI !== 'undefined') {
				LeaderboardUI.showFeeds();
				LeaderboardUI.refreshFeeds();
			}
		}

		function onPickFeedTrack(source, id, title, artist){
			primeAudio();
			var prompt = document.getElementById('share-prompt');
			if (prompt) {
				prompt.textContent = 'loading «' + (title || id) + '» from ' + source + '…';
				prompt.classList.remove('hidden');
			}
			Search.lookup(source, id).then(function(result){
				if (prompt) prompt.classList.add('hidden');
				playSearchResult(result);
			}).catch(function(err){
				if (prompt) prompt.classList.add('hidden');
				infoEl.textContent = 'feed pick failed: ' + (err.message || err);
			});
		}
		window.addEventListener('track-finished', function(){
			var finishedTrack = currentShareTrack;
			var finishedScore = (typeof scoring !== 'undefined') ? scoring.getScore() : (window.SCORE | 0);
			var finishedHistory = (typeof scoring !== 'undefined') ? scoring.getHistory() : null;
			LeaderboardUI.onTrackFinished(finishedTrack, finishedScore, finishedHistory);
			if (typeof Ghosts !== 'undefined') Ghosts.clear();
			clearShareTrack();
			exitGameState();
		});

		// Audio activation. Browsers grant autoplay only when .play() is
		// called inside a user-gesture handler. Our flow is async — the
		// click on a track triggers fetch → decode → analyze → swap →
		// .play(), which can take seconds. To keep the gesture token
		// alive across that gap, we call primeAudio() SYNCHRONOUSLY from
		// each gesture handler: it plays a tiny silent WAV on MPlayer.audio,
		// which registers user-activation on that element so subsequent
		// .play() calls work without fresh gestures.
		//
		// Drag-and-drop has no gesture (the drop event isn't user-
		// activation in most browsers), so the DnD handler instead shows
		// the #play-prompt — the click on that prompt IS the gesture, and
		// it primes audio + launches analysis.
		var SILENT_WAV = 'data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA';
		var audioPrimed = false;
		function primeAudio(){
			if (audioPrimed) return;
			if (typeof MPlayer === 'undefined' || !MPlayer.audio) return;
			audioPrimed = true;
			MPlayer.audio.src = SILENT_WAV;
			var p = MPlayer.audio.play();
			if (p && p.then) {
				p.then(function(){
					MPlayer.audio.pause();
					MPlayer.audio.currentTime = 0;
				}).catch(function(){});
			}
		}

		function isAudioFile(n){ return /\.(mp3|ogg|wav|m4a|flac|aac)$/i.test(n); }

		function injectInline(text){
			var s = document.createElement('script');
			s.textContent = text;
			document.head.appendChild(s);
		}
		function injectSrc(src){
			return new Promise(function(res, rej){
				var s = document.createElement('script');
				s.src = src;
				s.onload = function(){ res(); };
				s.onerror = function(){ rej(new Error('Failed to load ' + src)); };
				document.head.appendChild(s);
			});
		}

		// First-time boot — load the prod bundle if present, else fall back
		// to the GAME_SCRIPTS waterfall (the dev path under Vite). After
		// this MPlayer/scene/render/etc. all exist and the render loop runs.
		function bootPreview(){
			window.PREVIEW = true;
			injectInline(PREVIEW_BEATS_TEXT);
			injectInline('window.musicSrc = "";');

			var loaded = injectSrc('dist/game.bundle.min.js').catch(function(){
				// Bundle missing (dev mode) → load each file individually.
				return GAME_SCRIPTS.reduce(function(p, src){
					return p.then(function(){ return injectSrc(src); });
				}, Promise.resolve());
			});

			return loaded.then(function(){
				wireVolume();
				wireSearch();
				wireShareButton();
				wireTimeDisplay();
				wireRenderScale();
				wireGhostsToggle();
				// `scoring.CUSTOM_PREFIX` only exists after scoring.js loads —
				// re-render now to pick up custom entries from previous sessions.
				renderTrackList();
				handleShareLink();
				LeaderboardUI.init({ onPickTrack: onPickFeedTrack });
				LeaderboardUI.refreshFeeds();
			});
		}

		// In-place swap from current state (preview OR a previous real track)
		// to a new track. Re-runs tube.js to rebuild the spline against the
		// dropped track's duration, then loadBeats() / addPlates() / scene.add.
		// `isCustom` decides whether the highscore lands under the bundled or
		// custom namespace (custom rows show up greyed-out in the list).
		function swap(beatsText, audioBlobUrl, label, isCustom){
			// 0. Freeze the render loop while we rebuild — keeps reseed() →
			//    tube.js → loadBeats() → addPlates() RNG-deterministic.
			window.__rebuilding = true;

			// 1. Remove current visual meshes from scene.
			if (window.tubeMesh) scene.remove(window.tubeMesh);
			if (window.BgPlate && window.BgPlate.prototype && window.BgPlate.prototype.mesh) {
				scene.remove(window.BgPlate.prototype.mesh);
			}

			// 2. Drop obstacles (preview has none; a previous real track has them).
			Obstacles.objects = [];
			Obstacles.curCollideTestNum = 0;
			Obstacles.trackFinished = false;

			// 3. Install new beats / duration / musicSrc as window globals.
			injectInline(beatsText);
			injectInline('window.musicSrc = ' + JSON.stringify(audioBlobUrl) + ';');

			if (typeof window.duration !== 'number' || !window.duration) {
				infoEl.textContent = 'invalid beats file (no `var duration`)';
				return;
			}
			if (!Array.isArray(window.beats) || !window.beats.length) {
				infoEl.textContent = 'invalid beats file (empty beats array)';
				return;
			}

			// 3b. Cap wall density (≤1 wall per second; excess walls become
			//     coins) then thin dense same-type clusters via filterBeats.
			var beforeN = window.beats.length;
			var beforeWalls = 0;
			for (var bi = 0; bi < window.beats.length; bi++) if (window.beats[bi].b === 2) beforeWalls++;
			window.beats = throttleWalls(window.beats);
			var afterWalls = 0;
			for (var bi = 0; bi < window.beats.length; bi++) if (window.beats[bi].b === 2) afterWalls++;
			window.beats = filterBeats(window.beats);
			console.log('beat-filter: ' + beforeN + ' → ' + window.beats.length +
				' (' + (beforeN - window.beats.length) + ' dropped); walls ' +
				beforeWalls + ' → ' + afterWalls + ' (' + (beforeWalls - afterWalls) + ' demoted to coins)');

			// 4. Audio source — pause first so the old buffer stops cleanly,
			//    then swap and let metadata reload. Skipped if loadPreset
			//    already primed the same src synchronously inside its
			//    click-handler (preserves the autoplay grant).
			var resolved = new URL(audioBlobUrl, location.href).href;
			if (MPlayer.audio.src !== resolved) {
				MPlayer.audio.pause();
				MPlayer.audio.src = audioBlobUrl;
				MPlayer.audio.load();
			}

			// 5. Reset loadBeats accumulators (they mutate across calls).
			window.tmpRot       = 0;
			window.tmpRotB      = 0;
			window.tmpRotC      = 0;
			window.sequenceVar  = 0;
			window.inv          = 1;
			window.lastBeatTime = 0;
			window.SCORE        = 0;

			// 6. Reseed the PRNG so this rebuild produces the same tube z-jitter,
			//    obstacle rotations and bg plate distribution as any previous /
			//    future replay of the same track.
			window.reseed(SEED);

			// 7. Rebuild spline / tube / BgPlate constructor with the NEW duration.
			//    tube.js declares everything with top-level `var`, so a re-inject
			//    reassigns the window globals (splinePoints, spline, level,
			//    tubeMesh, BgPlate, BgWall). Old ones become garbage.
			//
			// Return the promise so callers (analyzeAndPlay) can wait for the
			// game to fully boot before dropping their loading overlay.
			return injectSrc('tube.js').then(function(){
				loadBeats();
				addPlates();
				scene.add(tubeMesh);

				// Ghost data may have landed before the tube was ready —
				// re-attach it now that spline/level are alive again.
				// Wrapped in try/catch so a ghost-rendering bug never
				// breaks the core swap-into-new-track flow.
				if (typeof Ghosts !== 'undefined' && window.ghosts) {
					try { Ghosts.spawn(window.ghosts); }
					catch (e) { console.warn('Ghosts.spawn failed:', e); }
				}

				// Score/multiplier/streak get reset; best score for this track
				// is loaded from localStorage and pushed to bestHud. For custom
				// drops scoring.reset also pre-creates the highscore entry so
				// the track shows up in the list immediately.
				scoring.reset(label, isCustom);

				window.PREVIEW = false;
				window.__rebuilding = false;
				infoEl.textContent = label;
				enterGameState();
				renderTrackList();
				var p = MPlayer.play();
				if (p && p.catch) p.catch(function(err){ console.warn('audio play() rejected:', err); });
			}).catch(function(err){
				window.__rebuilding = false;
				infoEl.textContent = 'rebuild failed: ' + (err && err.message || err);
				throw err;
			});
		}

		// Loading overlay — flipped on at the start of any "load a track"
		// flow and off again once analyzeAndPlay's full chain (including the
		// async swap → tube.js → loadBeats → MPlayer.play) settles.
		var loadingTextEl = document.querySelector('#loading-overlay span');
		function showLoading(){ document.body.classList.add('loading'); }
		function hideLoading(){
			document.body.classList.remove('loading');
			loadingTextEl.textContent = 'loading…';
		}
		function setLoadingText(text){ loadingTextEl.textContent = text; }

		// Fetch with streaming progress. Falls back to plain fetch().blob()
		// when Content-Length is missing or ReadableStream is unsupported,
		// so the caller never has to branch.
		function fetchWithProgress(url, onProgress){
			return fetch(url).then(function(response){
				if (!response.ok) throw new Error('HTTP ' + response.status);
				var total = parseInt(response.headers.get('Content-Length') || '0', 10);
				if (!total || !response.body || !response.body.getReader) {
					return response.blob();
				}
				var reader   = response.body.getReader();
				var chunks   = [];
				var received = 0;
				return new Promise(function(resolve, reject){
					function pump(){
						reader.read().then(function(r){
							if (r.done) { resolve(new Blob(chunks)); return; }
							chunks.push(r.value);
							received += r.value.length;
							if (onProgress) onProgress(received / total);
							pump();
						}).catch(reject);
					}
					pump();
				});
			});
		}

		function wireVolume(){
			var musicSlider = document.getElementById('vol-slider');
			var sfxSlider   = document.getElementById('sfx-slider');
			var musicLabel  = document.querySelector('.vol-label[data-channel="music"]');
			var sfxLabel    = document.querySelector('.vol-label[data-channel="sfx"]');

			var savedVol = parseInt(localStorage.getItem('vol') || '50', 10);
			musicSlider.value = String(savedVol);
			MPlayer.audio.volume = savedVol / 100;
			musicLabel.classList.toggle('muted', savedVol === 0);

			musicSlider.addEventListener('input', function(e){
				var v = parseInt(e.target.value, 10);
				MPlayer.audio.volume = v / 100;
				localStorage.setItem('vol', String(v));
				musicLabel.classList.toggle('muted', v === 0);
			});
			musicSlider.addEventListener('keydown', function(e){ e.stopPropagation(); });

			sfxSlider.value = String(Math.round(SFX.getVolume() * 100));
			sfxLabel.classList.toggle('muted', sfxSlider.value === '0');
			sfxSlider.addEventListener('input', function(e){
				var v = parseInt(e.target.value, 10);
				SFX.setVolume(v / 100);
				sfxLabel.classList.toggle('muted', v === 0);
			});
			sfxSlider.addEventListener('keydown', function(e){ e.stopPropagation(); });

			function toggleMute(slider, label){
				if (slider.value === '0') {
					slider.value = slider.dataset.prevVolume || '50';
				} else {
					slider.dataset.prevVolume = slider.value;
					slider.value = '0';
				}
				slider.dispatchEvent(new Event('input'));
			}
			musicLabel.addEventListener('click', function(){ toggleMute(musicSlider, musicLabel); });
			sfxLabel.addEventListener('click',   function(){ toggleMute(sfxSlider,   sfxLabel);   });
		}

		// === Track list ===
		// Three flavours of rows:
		//   - bundled (from tracks/manifest.json) — clickable, plays the preset
		//   - custom + replayable (search result we played at least once;
		//     metadata kept in kulm_track_meta_custom_<label>) — clickable,
		//     re-fetches the audio from the stored URL
		//   - custom + dead (DnD'd file, no replay possible) — greyed out,
		//     only there to show the highscore
		var TRACK_META_PREFIX = 'kulm_track_meta_custom_';
		function saveTrackMeta(label, meta){
			try {
				localStorage.setItem(TRACK_META_PREFIX + label, JSON.stringify(meta));
			} catch (err) { /* quota etc — non-fatal */ }
		}
		function getTrackMeta(label){
			try {
				var raw = localStorage.getItem(TRACK_META_PREFIX + label);
				return raw ? JSON.parse(raw) : null;
			} catch (err) { return null; }
		}
		function listCustomEntries(){
			var out = [];
			if (typeof scoring === 'undefined') return out;
			for (var i = 0; i < localStorage.length; i++) {
				var k = localStorage.key(i);
				if (k && k.indexOf(scoring.CUSTOM_PREFIX) === 0) {
					out.push({
						id:    k.slice(scoring.CUSTOM_PREFIX.length),
						score: parseInt(localStorage.getItem(k) || '0', 10) || 0,
					});
				}
			}
			out.sort(function(a, b){ return a.id.localeCompare(b.id); });
			return out;
		}
		function isSearchActive(){
			return searchEl && searchEl.value.trim().length >= 2;
		}
		function renderTrackList(){
			// Search mode = bundled+history hidden. Search results take over.
			trackListEl.classList.toggle('hidden', isSearchActive());
			trackListEl.innerHTML = '';
			if (isSearchActive()) return;

			function rowFor(name, score, isBundled, storageKey, onClick, isActive, isReplayable, metaToo, extUrl){
				var classes = ['item'];
				classes.push(isBundled ? 'bundled' : 'custom');
				if (isActive)     classes.push('active');
				if (isReplayable) classes.push('replayable');
				var row = document.createElement('div');
				row.className = classes.join(' ');
				var n = document.createElement('span');
				n.className = 'name';
				n.textContent = name;
				n.title = name + (isBundled || isReplayable ? '' : ' (custom — drop again to play)');
				if (onClick) n.addEventListener('click', onClick);
				var s = document.createElement('span');
				s.className = 'score';
				s.textContent = score ? score : '—';
				row.appendChild(n);
				row.appendChild(s);
				// Optional ↗ — clickable backlink to the track's page on the
				// source service (Audius/etc). Same visual as in the search list.
				if (extUrl) {
					var ext = document.createElement('a');
					ext.className = 'ext';
					ext.href = extUrl;
					ext.target = '_blank';
					ext.rel = 'noopener';
					ext.textContent = '↗';
					ext.title = 'open source page';
					ext.addEventListener('click', function(e){ e.stopPropagation(); });
					row.appendChild(ext);
				}
				// Clear (×). Bundled row clears the highscore entry; custom row
				// removes the highscore entry AND the track-meta entry (if any),
				// removing the row from the list entirely.
				var x = document.createElement('span');
				x.className = 'clear';
				x.textContent = '×';
				x.title = isBundled ? 'clear highscore' : 'remove from list';
				x.addEventListener('click', function(e){
					e.preventDefault();
					e.stopPropagation();
					localStorage.removeItem(storageKey);
					if (metaToo) localStorage.removeItem(metaToo);
					renderTrackList();
				});
				row.appendChild(x);
				return row;
			}
			var bundlePrefix = (typeof scoring !== 'undefined') ? scoring.BUNDLED_PREFIX : 'kulm_best_';
			var customPrefix = (typeof scoring !== 'undefined') ? scoring.CUSTOM_PREFIX  : 'kulm_best_custom_';
			presets.forEach(function(t){
				var best = parseInt(localStorage.getItem(bundlePrefix + t.id) || '0', 10) || 0;
				var isActive = activeTrackId === t.id;
				var row = rowFor(t.id, best, true, bundlePrefix + t.id, function(e){
					e.preventDefault();
					loadPreset(t);
				}, isActive, false, null, null);
				trackListEl.appendChild(row);
			});
			listCustomEntries().forEach(function(c){
				var meta = getTrackMeta(c.id);
				// Replayable iff we have either a URL fallback or a
				// stable (source, id) the cache might hold. The actual
				// cache check happens at click time in loadFromMeta;
				// here we just decide whether to render the row hot.
				var canReplay = meta && (meta.audio || (meta.source && meta.id));
				var click = canReplay ? function(e){
					e.preventDefault();
					loadFromMeta(c.id, meta);
				} : null;
				trackListEl.appendChild(rowFor(
					c.id, c.score, false,
					customPrefix + c.id,
					click,
					false,
					!!click,                       // replayable iff we have meta
					TRACK_META_PREFIX + c.id,      // × also removes meta
					meta && meta.track_url || null // ↗ link to the source page
				));
			});
			if (!presets.length && !listCustomEntries().length) {
				var empty = document.createElement('div');
				empty.className = 'empty';
				empty.textContent = 'no tracks — drop a .mp3 anywhere or search above';
				trackListEl.appendChild(empty);
			}
		}

		// Replay a custom track from its stored metadata (an audio URL we
		// kept after the first play). Same swap path as a fresh search
		// result; we just skip the search step.
		function loadFromMeta(label, meta){
			primeAudio();
			showLoading();
			setLoadingText('loading…');
			activeTrackId = null;
			// Custom (DnD) tracks have no shareable source/id pair —
			// only Audius does.
			if (meta.source && meta.id && meta.source !== 'custom') {
				setShareTrack(meta.source, meta.id, label, null);
			} else {
				clearShareTrack();
			}
			setCover(meta.cover || null);
			infoEl.textContent = 'fetching ' + label + '…';

			// Cache first (works for Audius re-loads AND for DnD restores
			// after page refresh, where meta.audio is null). Fall back to
			// the network only for Audius / legacy entries that still have
			// a URL.
			var cacheLookup = (meta.source && meta.id)
				? TrackCache.lookup(meta.source, meta.id)
				: Promise.resolve(null);

			cacheLookup.then(function(cached){
				if (cached) {
					setLoadingText('cached…');
					return cached;
				}
				if (!meta.audio) {
					throw new Error('drop the file again — cached copy expired');
				}
				return fetchWithProgress(meta.audio, function(p){
					setLoadingText('loading ' + Math.floor(p * 100) + '%');
				}).then(function(blob){
					// Audius URL fetched — populate cache so next replay
					// is instant. Custom has no URL → never reaches here.
					if (meta.source && meta.id && meta.source !== 'custom') {
						TrackCache.put(meta.source, meta.id, blob, {
							title:  label,
							cover:  meta.cover || null,
						});
					}
					return blob;
				});
			}).then(function(blob){
				return analyzeAndPlay(blob, label, meta.source === 'custom');
			}).catch(function(err){
				hideLoading();
				infoEl.textContent = 'replay fetch failed: ' + (err.message || err);
			});
		}

		function loadPreset(t){
			primeAudio();
			showLoading();
			setLoadingText('loading…');
			clearShareTrack();
			clearCover();
			infoEl.textContent = 'loading ' + t.id + '…';
			fetchWithProgress(t.audio, function(p){
				setLoadingText('loading ' + Math.floor(p * 100) + '%');
			}).then(function(blob){
				activeTrackId = t.id;
				return analyzeAndPlay(blob, t.id, false);
			}).catch(function(err){
				hideLoading();
				infoEl.textContent = 'failed: ' + (err.message || err);
			});
		}

		fetch('tracks/manifest.json').then(function(r){
			return r.ok ? r.json() : [];
		}).then(function(json){
			presets = json || [];
			renderTrackList();
		}).catch(function(){
			// no manifest — just leave the list empty; DnD still works.
		});

		var searchEl   = document.getElementById('track-search');
		var resultsEl  = document.getElementById('search-results');
		var engineEl   = document.getElementById('search-engine');
		var shareBtn   = document.getElementById('share-btn');

		// {source, id} for the currently playing track when it came from a
		// search result (shareable). Null for bundled presets and DnD audio
		// (no public URL on the other side to reconstruct from).
		var currentShareTrack = null;

		// Ghost data for the currently-playing track — top-N runs (with
		// per-play history timelines) so we can later overlay other
		// players' progress as the player runs the same track. Null
		// before fetch completes, an array once loaded. PoC: just
		// hangs on window for later rendering; no UI yet.
		window.ghosts = null;

		function setShareTrack(source, rawId, title, artist){
			currentShareTrack = {
				source: source,
				id:     rawId,
				title:  title  || rawId,
				artist: artist || null,
			};
			shareBtn.classList.remove('hidden');
			var url = new URL(location.href);
			url.search = '';
			url.searchParams.set('source', source);
			url.searchParams.set('id',     rawId);
			history.replaceState(null, '', url.toString());

			// Fire-and-forget ghost fetch. Stash track identity on the
			// promise's closure so a rapid track switch can discard the
			// stale response. If the tube/spline is already up by the
			// time the response arrives (fast network, slow audio), we
			// spawn immediately — otherwise swap() will do it.
			//
			// Guards: each ghost-mode dependency is checked separately
			// so a missing/older Leaderboard / Ghosts module never blocks
			// the audio fetch that follows this call.
			window.ghosts = null;
			if (typeof Ghosts !== 'undefined') {
				try { Ghosts.clear(); } catch (e) { console.warn('Ghosts.clear failed:', e); }
			}
			if (typeof Leaderboard !== 'undefined' && typeof Leaderboard.ghosts === 'function') {
				var expected = currentShareTrack;
				try {
					Leaderboard.ghosts(source, rawId, 10).then(function(data){
						if (currentShareTrack !== expected) return;
						window.ghosts = (data && data.rows) || [];
						console.log('ghosts loaded:', window.ghosts.length, 'runs for', source + ':' + rawId);
						if (typeof Ghosts !== 'undefined' && typeof spline !== 'undefined') {
							try { Ghosts.spawn(window.ghosts); }
							catch (e) { console.warn('Ghosts.spawn failed:', e); }
						}
					}).catch(function(e){ console.warn('ghosts fetch failed:', e); });
				} catch (e) {
					console.warn('Leaderboard.ghosts call threw:', e);
				}
			}
		}
		function clearShareTrack(){
			currentShareTrack = null;
			window.ghosts = null;
			shareBtn.classList.add('hidden');
			if (location.search) history.replaceState(null, '', location.pathname);
		}

		function playSearchResult(result){
			primeAudio();
			showLoading();
			setLoadingText('loading…');
			var label = result.artist ? (result.artist + ' — ' + result.name) : result.name;
			var rawId = result.id.indexOf(':') > -1 ? result.id.split(':')[1] : result.id;
			activeTrackId = null;
			setShareTrack(result.source, rawId, result.name, result.artist || null);
			setCover(result.cover);
			infoEl.textContent = 'fetching ' + label + ' from ' + result.source + '…';

			// IndexedDB cache: avoid re-downloading the same Audius blob
			// across reloads/replays. Miss → network fetch + populate cache.
			TrackCache.lookup(result.source, rawId).then(function(cached){
				if (cached) {
					setLoadingText('cached…');
					return cached;
				}
				return fetchWithProgress(result.audio, function(p){
					setLoadingText('loading ' + Math.floor(p * 100) + '%');
				}).then(function(blob){
					TrackCache.put(result.source, rawId, blob, {
						title:  result.name,
						artist: result.artist || null,
						cover:  result.cover || null,
					});
					return blob;
				});
			}).then(function(blob){
				saveTrackMeta(label, {
					audio:     result.audio,
					track_url: result.track_url,
					duration:  result.duration,
					source:    result.source,
					id:        rawId,
					cover:     result.cover || null,
				});
				return analyzeAndPlay(blob, label, true);
			}).catch(function(err){
				hideLoading();
				infoEl.textContent = result.source + ' fetch failed: ' + (err.message || err);
			});
		}

		function wireShareButton(){
			shareBtn.addEventListener('click', function(){
				if (!currentShareTrack) return;
				var url = new URL(location.origin + location.pathname);
				url.searchParams.set('source', currentShareTrack.source);
				url.searchParams.set('id',     currentShareTrack.id);
				navigator.clipboard.writeText(url.toString()).then(function(){
					var original = shareBtn.textContent;
					shareBtn.textContent = 'copied!';
					setTimeout(function(){ shareBtn.textContent = original; }, 1500);
				}).catch(function(err){
					infoEl.textContent = 'clipboard failed: ' + (err.message || err);
				});
			});
		}

		// Read ?source=...&id=... and prepare the track for playback. Looks
		// up metadata immediately (metadata fetch needs no user gesture) but
		// gates the audio download + AudioContext work behind an explicit
		// click on the share-prompt — browsers require user interaction
		// before AudioContext is allowed to start, and an unprompted
		// auto-fetch + analyze feels broken on a fresh tab anyway.
		function handleShareLink(){
			var params = new URLSearchParams(location.search);
			var source = params.get('source');
			var id     = params.get('id');
			if (!source || !id) return;

			var prompt = document.getElementById('share-prompt');
			prompt.textContent = 'loading shared track info…';
			prompt.classList.remove('hidden');

			Search.lookup(source, id).then(function(result){
				var label = result.artist ? (result.artist + ' — ' + result.name) : result.name;
				prompt.textContent = '▶ click to play «' + label + '» from ' + result.source;
				prompt.onclick = function(){
					prompt.onclick = null;
					prompt.classList.add('hidden');
					playSearchResult(result);
				};
			}).catch(function(err){
				prompt.classList.add('hidden');
				infoEl.textContent = 'share link failed: ' + (err.message || err);
			});
		}

		function wireSearch(){
			SearchUI.attach({
				input:         searchEl,
				results:       resultsEl,
				engineSelect:  engineEl,
				onPick:        playSearchResult,
				onStart:       renderTrackList,
				onClear:       renderTrackList,
			});
		}

		// ESC anywhere → reload to the menu. Cheap "back to lobby" gesture.
		document.addEventListener('keydown', function(e){
			if (e.key === 'Escape') {
				e.preventDefault();
				window.location.reload();
			}
		});

		// Single path for "got an audio blob, give me a playable track":
		// decode it into an AudioBuffer, run the offline beat detector,
		// synthesize a beats.js-equivalent text, then swap. Used by both the
		// preset-click path (audio fetched from tracks/) and the drop path
		// (audio File from DataTransfer).
		function analyzeAndPlay(audioBlob, label, isCustom){
			showLoading();
			setLoadingText('decoding…');
			infoEl.textContent = 'decoding ' + label + '…';
			var AC = window.AudioContext || window.webkitAudioContext;
			var ctx = new AC();

			return audioBlob.arrayBuffer().then(function(arrBuf){
				return ctx.decodeAudioData(arrBuf);
			}).then(function(audioBuffer){
				setLoadingText('analyzing 0%');
				infoEl.textContent = 'analyzing ' + label + '…';
				return detectBeats(audioBuffer, function(p){
					var pct = Math.floor(p * 100);
					setLoadingText('analyzing ' + pct + '%');
					infoEl.textContent = 'analyzing ' + label + ' ' + pct + '%';
				});
			}).then(function(result){
				if (!result.beats.length) throw new Error('analyze produced 0 beats');
				var beatsText =
					'var beats = '    + JSON.stringify(result.beats) + ';\n' +
					'var duration = ' + result.duration + ';\n' +
					'var musicSrc = "";\n';
				var newUrl = URL.createObjectURL(audioBlob);
				if (currentAudioUrl) URL.revokeObjectURL(currentAudioUrl);
				currentAudioUrl = newUrl;
				return swap(beatsText, newUrl, label, isCustom);  // wait for tube/loadBeats/MPlayer
			}).catch(function(err){
				infoEl.textContent = 'analyze failed: ' + (err && err.message || err);
			}).finally(function(){
				hideLoading();
				if (ctx.close) ctx.close();
			});
		}

		// === DnD ===
		var dragDepth = 0;
		document.addEventListener('dragenter', function(e){
			e.preventDefault();
			dragDepth++;
			dropOverlay.classList.add('active');
		});
		document.addEventListener('dragleave', function(){
			dragDepth--;
			if (dragDepth <= 0) { dragDepth = 0; dropOverlay.classList.remove('active'); }
		});
		document.addEventListener('dragover', function(e){ e.preventDefault(); });
		document.addEventListener('drop', function(e){
			e.preventDefault();
			dragDepth = 0;
			dropOverlay.classList.remove('active');

			var files = Array.from(e.dataTransfer.files || []);
			var audio = files.find(function(f){ return isAudioFile(f.name); });

			if (!audio) {
				infoEl.textContent = 'need an .mp3/.wav/.ogg — try again';
				return;
			}

			// Drop events aren't user-activation in most browsers, so we
			// gate ALL DnD work behind a [play] confirmation. The click on
			// that prompt is the gesture token; it primes audio + kicks
			// off analysis. Loading flows from search/list lists don't go
			// through this gate — their click IS already the gesture.
			showPlayPrompt(audio.name, '', function(){
				primeAudio();
				activeTrackId = null;
				clearShareTrack();
				clearCover();
				// Persist the blob in IndexedDB + a meta pointer in
				// localStorage so this drop survives a page refresh.
				// Composite id (name + size + lastModified) makes the
				// same file dropped twice hit the existing cache row.
				var fileId = TrackCache.customId(audio);
				TrackCache.put('custom', fileId, audio, { title: audio.name });
				saveTrackMeta(audio.name, {
					source: 'custom',
					id:     fileId,
					audio:  null,   // blob URL dies on refresh — cache is the source of truth
				});
				analyzeAndPlay(audio, audio.name, true);
			});
		});

		// Boot preview on page load.
		bootPreview();
	})();
	</script>
</body>
</html>
