	var SELECTED_TRACK = (new URLSearchParams(location.search).get('track')) || 'luckystar';
	var pickedTrack = TRACKS.find(function(t){ return t.id === SELECTED_TRACK; }) || TRACKS[0];
	SELECTED_TRACK = pickedTrack.id;
	document.write('<script src="' + pickedTrack.file + '"><\/script>');
	</script>

	MPlayer.prototype.play = function() {
	    this.audio.loop = true;
	    var self = this;
	    var promise = self.audio.play();
	    if (promise && promise.catch) {
	        promise.catch(function(){
	            // Autoplay blocked (Firefox/Chrome since 2017) — wait for first user gesture.
	            var resume = function(){
	                self.audio.play();
	                document.removeEventListener('click', resume);
	                document.removeEventListener('touchstart', resume);
	                document.removeEventListener('keydown', resume);
	            };
	            document.addEventListener('click', resume);
	            document.addEventListener('touchstart', resume);
	            document.addEventListener('keydown', resume);
	        });
	    }
	};

	return new MPlayer();
})();

	</div>
	<script>
	(function(){
		var trackList = document.getElementById('track-list');
		// Only the luckystar track has its audio file (example10.mp3) on disk; the
		// rest reference missing files or absolute paths from a 2014-era machine.
		// Mark broken tracks with .silent so users see they exist but won't play.
		var WORKING_AUDIO = { 'example10.mp3': true };
		TRACKS.forEach(function(t){
			var a = document.createElement('a');
			a.href = '?track=' + encodeURIComponent(t.id);
			a.textContent = t.id;
			if (t.id === SELECTED_TRACK) a.className = 'active';
			else if (!WORKING_AUDIO[t.audio]) a.className = 'silent';
			a.title = t.audio + (WORKING_AUDIO[t.audio] ? '' : '  (audio file missing — beats only)');
			trackList.appendChild(a);
		});

		var slider = document.getElementById('vol-slider');
		var savedVol = parseInt(localStorage.getItem('vol') || '50', 10);
		slider.value = String(savedVol);
		if (typeof MPlayer !== 'undefined' && MPlayer.audio) {
			MPlayer.audio.volume = savedVol / 100;
		}
		slider.addEventListener('input', function(e){
			var v = parseInt(e.target.value, 10);
			if (typeof MPlayer !== 'undefined' && MPlayer.audio) {
				MPlayer.audio.volume = v / 100;
			}
			localStorage.setItem('vol', String(v));
		});
		// Prevent slider keyboard events from also reaching the game (arrow keys)
		slider.addEventListener('keydown', function(e){ e.stopPropagation(); });
	})();
	</script>
