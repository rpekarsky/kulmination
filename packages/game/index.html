	body, html {
		padding: 0;

		position: relative;

		font-size: 18px;
		text-align: left;
	}

	.page{
		position: absolute;
		max-height: 100%;
		overflow: auto;
		top: 0;
	}
	.page button{
		line-height: 26px;
		font-size: 18px;
		text-align: left;
	}
	.controls {
		position: absolute;
		width: 100%;
		height: 50%;
		bottom: 0;
	}
	.controls .control {
		width: 20%;
		height: 100%;
		position: absolute;
		box-shadow: 0px 0px 5px black;
	}

	.control.left {
		left: 0;
	}

	.control.right {
		right: 0;
	}
