<!DOCTYPE HTML>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kulmination</title>
<style type="text/css">
	body {
		padding: 0;
		margin: 0;
		background: #000;
		color: #ccc;
		font-family: monospace;
	}
	canvas { display: block; }

	.score-hud{
		font-size: 20pt;
		font-family: ubuntu;
		font-weight: bold;
		color: white;
		text-shadow: 5px 5px 10px rgba(0,0,0,0.3), 2px 2px 0px rgba(0,0,0,0.7), 1px 1px rgba(0,0,0,0.8);
	}

	#hint {
		position: fixed;
		top: 28px; left: 50%;
		transform: translateX(-50%);
		padding: 10px 18px;
		background: rgba(0,0,0,0.55);
		border: 1px solid rgba(255,255,255,0.15);
		border-radius: 6px;
		z-index: 110;
		font-size: 13px;
		color: #ddd;
		text-align: center;
		pointer-events: none;
		max-width: 80vw;
	}
	#hint.hidden { display: none; }
	#hint .sub { color: #888; font-size: 11px; margin-top: 4px; }
	#hint a { color: #88c; pointer-events: auto; }

	.overlay {
		position: fixed;
		bottom: 0; left: 0; right: 0;
		padding: 8px 14px;
		background: rgba(0,0,0,0.35);
		z-index: 100;
		font-size: 11px;
		color: #888;
		display: flex;
		gap: 18px;
		align-items: center;
		flex-wrap: wrap;
	}
	.overlay .info { color: #ccc; }
	.overlay .vol { display: flex; align-items: center; gap: 6px; color: #aaa; }
	.overlay .vol input[type=range] { width: 80px; }
	.overlay .tracks { display: flex; gap: 9px; flex-wrap: wrap; align-items: center; }
	.overlay .tracks a {
		color: #888; text-decoration: none; cursor: pointer;
		border-bottom: 1px dotted #444;
	}
	.overlay .tracks a:hover { color: #ddd; border-bottom-color: #888; }
	.overlay .tracks a.active { color: #fff; font-weight: bold; border-bottom-color: #fff; }
	.overlay .tracks .custom { color: #8c8; }

	#drop-overlay {
		display: none;
		position: fixed; inset: 0;
		background: rgba(0,100,200,0.25);
		border: 6px dashed rgba(255,255,255,0.55);
		z-index: 9999;
		pointer-events: none;
		font-size: 22px;
		color: #fff;
		text-shadow: 2px 2px 0 rgba(0,0,0,0.6);
		align-items: center;
		justify-content: center;
		text-align: center;
	}
	#drop-overlay.active { display: flex; }
	#drop-overlay span { padding: 12px 24px; background: rgba(0,0,0,0.55); border-radius: 6px; }
</style>
</head>
<body>
	<div id="hint">
		<strong>Kulmination</strong> &mdash; drop <strong>audio</strong> (.mp3/.wav/.ogg) + <strong>beats</strong> (.js) anywhere to play
		<div class="sub">need beats? <a href="../audio-analyzer/" target="_blank">audio analyzer</a></div>
	</div>

	<div id="drop-overlay"><span>drop <strong>audio</strong> + <strong>beats</strong> (both files together)</span></div>

	<div class="overlay" id="game-overlay">
		<span class="tracks" id="track-list"></span>
		<span class="info" id="info">preview</span>
		<label class="vol">music <input type="range" id="vol-slider" min="0" max="100"></label>
		<label class="vol">sfx <input type="range" id="sfx-slider" min="0" max="100"></label>
	</div>

	<script src='js/dat.gui.min.js'></script>
	<script src="js/three.min.js"></script>
	<script src="js/CurveExtras.js"></script>
	<script src="js/renderers/CSS3DRenderer.js"></script>

	<script>
	// Bootstrap.
	//
	// Page load:
	//   - boots in PREVIEW with empty beats + 60s dummy duration + no audio.
	//   - mainloop runs camera + player only, no obstacles, no audio.
	//   - user sees the tube/plane idling as a screensaver.
	//
	// Drop (preview OR mid-play):
	//   - audio gets a Blob URL (lives in memory, no 5MB cap)
	//   - beats text is inlined into a new <script>, redefining the window
	//     globals beats / duration / musicSrc
	//   - swap() tears down the preview/old scene meshes, re-injects tube.js
	//     to rebuild the spline against the new duration, then calls
	//     loadBeats() + addPlates() to repopulate
	//   - new audio src is set on MPlayer.audio, PREVIEW flag cleared, play.
	//   - no sessionStorage, no location.reload.
	(function(){
		var GAME_SCRIPTS = [
			'MPlayer.js',
			'GameObject.js', 'Vector4.js', 'SplineCurve4.js', 'TubeGeometry.js',
			'utils.js', 'gui.js', 'camera.js', 'player.js', 'obstacles.js', 'tube.js',
			'hud.js', 'SFX.js', 'main.js', 'loop.js', 'initialize.js'
		];

		var PREVIEW_BEATS_TEXT = 'var beats = []; var duration = 60000; var musicSrc = "";';

		var infoEl      = document.getElementById('info');
		var hintEl      = document.getElementById('hint');
		var dropOverlay = document.getElementById('drop-overlay');
		var trackListEl = document.getElementById('track-list');

		var presets        = [];        // manifest entries [{id, audio, beats}]
		var activeTrackId  = null;      // currently playing preset id (null = preview or custom drop)
		var currentAudioUrl = null;     // for revoking previous Blob URL on swap

		function isAudioFile(n){ return /\.(mp3|ogg|wav|m4a|flac|aac)$/i.test(n); }
		function isBeatsFile(n){ return /\.(js|json)$/i.test(n); }

		function readText(file){
			return new Promise(function(res, rej){
				var fr = new FileReader();
				fr.onload = function(e){ res(e.target.result); };
				fr.onerror = function(){ rej(fr.error); };
				fr.readAsText(file);
			});
		}

		function injectInline(text){
			var s = document.createElement('script');
			s.textContent = text;
			document.head.appendChild(s);
		}
		function injectSrc(src){
			return new Promise(function(res, rej){
				var s = document.createElement('script');
				s.src = src;
				s.onload = function(){ res(); };
				s.onerror = function(){ rej(new Error('Failed to load ' + src)); };
				document.head.appendChild(s);
			});
		}

		// First-time boot — load every game script in order with the preview
		// "track" already declared. After this MPlayer/scene/render/etc. all
		// exist and the render loop is running.
		function bootPreview(){
			window.PREVIEW = true;
			injectInline(PREVIEW_BEATS_TEXT);
			injectInline('window.musicSrc = "";');
			return GAME_SCRIPTS.reduce(function(p, src){
				return p.then(function(){ return injectSrc(src); });
			}, Promise.resolve()).then(wireVolume);
		}

		// In-place swap from current state (preview OR a previous real track)
		// to a new track. Re-runs tube.js to rebuild the spline against the
		// dropped track's duration, then loadBeats() / addPlates() / scene.add.
		function swap(beatsText, audioBlobUrl, label){
			// 1. Remove current visual meshes from scene.
			if (window.tubeMesh) scene.remove(window.tubeMesh);
			if (window.BgPlate && window.BgPlate.prototype && window.BgPlate.prototype.mesh) {
				scene.remove(window.BgPlate.prototype.mesh);
			}

			// 2. Drop obstacles (preview has none; a previous real track has them).
			Obstacles.objects = [];
			Obstacles.curCollideTestNum = 0;

			// 3. Install new beats / duration / musicSrc as window globals.
			injectInline(beatsText);
			injectInline('window.musicSrc = ' + JSON.stringify(audioBlobUrl) + ';');

			if (typeof window.duration !== 'number' || !window.duration) {
				infoEl.textContent = 'invalid beats file (no `var duration`)';
				return;
			}
			if (!Array.isArray(window.beats) || !window.beats.length) {
				infoEl.textContent = 'invalid beats file (empty beats array)';
				return;
			}

			// 4. Audio source — pause first so the old buffer stops cleanly, then
			//    swap and let metadata reload.
			MPlayer.audio.pause();
			MPlayer.audio.src = audioBlobUrl;
			MPlayer.audio.load();

			// 5. Reset loadBeats accumulators (they mutate across calls).
			window.tmpRot       = 0;
			window.tmpRotB      = 0;
			window.tmpRotC      = 0;
			window.sequenceVar  = 0;
			window.inv          = 1;
			window.lastBeatTime = 0;
			window.SCORE        = 0;

			// 6. Rebuild spline / tube / BgPlate constructor with the NEW duration.
			//    tube.js declares everything with top-level `var`, so a re-inject
			//    reassigns the window globals (splinePoints, spline, level,
			//    tubeMesh, BgPlate, BgWall). Old ones become garbage.
			injectSrc('tube.js').then(function(){
				loadBeats();
				addPlates();
				scene.add(tubeMesh);

				window.PREVIEW = false;
				hintEl.classList.add('hidden');
				infoEl.textContent = label;
				MPlayer.play();
			}).catch(function(err){
				infoEl.textContent = 'rebuild failed: ' + (err && err.message || err);
			});
		}

		function wireVolume(){
			var vol = document.getElementById('vol-slider');
			var savedVol = parseInt(localStorage.getItem('vol') || '50', 10);
			vol.value = String(savedVol);
			MPlayer.audio.volume = savedVol / 100;
			vol.addEventListener('input', function(e){
				var v = parseInt(e.target.value, 10);
				MPlayer.audio.volume = v / 100;
				localStorage.setItem('vol', String(v));
			});
			vol.addEventListener('keydown', function(e){ e.stopPropagation(); });

			var sfxSlider = document.getElementById('sfx-slider');
			sfxSlider.value = String(Math.round(SFX.getVolume() * 100));
			sfxSlider.addEventListener('input', function(e){
				SFX.setVolume(parseInt(e.target.value, 10) / 100);
			});
			sfxSlider.addEventListener('keydown', function(e){ e.stopPropagation(); });
		}

		// === Presets ===
		// Fetch the build-script-generated manifest, render a clickable list
		// in the bottom overlay. Click → fetch the beats file as text, run
		// the same swap() the drop-handler uses with the static audio URL.
		function renderTrackList(){
			trackListEl.innerHTML = '';
			presets.forEach(function(t){
				var a = document.createElement('a');
				a.textContent = t.id;
				a.title = t.id;
				if (activeTrackId === t.id) a.className = 'active';
				a.addEventListener('click', function(e){
					e.preventDefault();
					loadPreset(t);
				});
				trackListEl.appendChild(a);
			});
			if (!activeTrackId && !window.PREVIEW) {
				var custom = document.createElement('span');
				custom.className = 'custom';
				custom.textContent = '(custom drop)';
				trackListEl.appendChild(custom);
			}
		}

		function loadPreset(t){
			infoEl.textContent = 'loading ' + t.id + '…';
			fetch(t.beats).then(function(r){
				if (!r.ok) throw new Error('HTTP ' + r.status);
				return r.text();
			}).then(function(beatsText){
				if (currentAudioUrl) URL.revokeObjectURL(currentAudioUrl);   // no-op on static paths
				currentAudioUrl = t.audio;
				activeTrackId = t.id;
				swap(beatsText, t.audio, t.id);
				renderTrackList();
			}).catch(function(err){
				infoEl.textContent = 'failed: ' + (err.message || err);
			});
		}

		fetch('tracks/manifest.json').then(function(r){
			return r.ok ? r.json() : [];
		}).then(function(json){
			presets = json || [];
			renderTrackList();
		}).catch(function(){
			// no manifest — just leave the list empty; DnD still works.
		});

		// === DnD ===
		var dragDepth = 0;
		document.addEventListener('dragenter', function(e){
			e.preventDefault();
			dragDepth++;
			dropOverlay.classList.add('active');
		});
		document.addEventListener('dragleave', function(){
			dragDepth--;
			if (dragDepth <= 0) { dragDepth = 0; dropOverlay.classList.remove('active'); }
		});
		document.addEventListener('dragover', function(e){ e.preventDefault(); });
		document.addEventListener('drop', function(e){
			e.preventDefault();
			dragDepth = 0;
			dropOverlay.classList.remove('active');

			var files = Array.from(e.dataTransfer.files || []);
			var audio = files.find(function(f){ return isAudioFile(f.name); });
			var beats = files.find(function(f){ return isBeatsFile(f.name) && !isAudioFile(f.name); });

			if (!audio || !beats) {
				infoEl.textContent = 'need BOTH .mp3/.wav/.ogg AND .js — try again';
				return;
			}

			infoEl.textContent = 'loading ' + audio.name + ' + ' + beats.name + '…';
			readText(beats).then(function(beatsText){
				var newUrl = URL.createObjectURL(audio);
				if (currentAudioUrl) URL.revokeObjectURL(currentAudioUrl);
				currentAudioUrl = newUrl;
				activeTrackId = null;
				swap(beatsText, newUrl, audio.name + ' + ' + beats.name);
				renderTrackList();
			}).catch(function(err){
				infoEl.textContent = 'drop failed: ' + (err && err.message || err);
			});
		});

		// Boot preview on page load.
		bootPreview();
	})();
	</script>
</body>
</html>
