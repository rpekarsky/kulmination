# Cloudflare Pages config (via wrangler.toml — BETA as of 2026-06).
# The repo deploys as a CF Pages project. With pages_build_output_dir
# set, CF Pages parses this file and applies the bindings declared
# here; without it, the entire toml is skipped and bindings have to be
# clicked into the dashboard manually.
#
# Worker entrypoint for Pages convention: ${pages_build_output_dir}/_worker.js
# (built by build.sh from src/worker.js + src/leaderboard.js via esbuild).
# env.ASSETS is auto-bound from the output dir — no [assets] block needed.

name = "kulmination"
compatibility_date = "2024-12-01"
pages_build_output_dir = "packages/game"

# Build delegates to a single explicit shell script — see the file for
# what runs and why. Single source of truth for build steps + tool
# versions; CF's build env diagnostics get dumped to the log on every
# run so failures aren't opaque. CF Pages dashboard build-command
# override (if set) needs to be CLEARED for this to apply.
[build]
command = "bash packages/game/.deploy/build.sh"

# Optional — KV namespace for caching Audius track metadata (1h TTL).
# Worker degrades to direct-API calls if this binding is missing, so it's
# safe to ship without it; uncomment + fill id after running
# `wrangler kv namespace create META_CACHE`.
#
# [[kv_namespaces]]
# binding = "META_CACHE"
# id      = "..."

# D1 database for the leaderboard + play-feed. See
# .deploy/leaderboard-setup.md for the one-time create / schema apply
# steps. /api/* endpoints in src/worker.js degrade to 503 if this binding
# is missing — frontend handles that gracefully.
[[d1_databases]]
binding       = "DB"
database_name = "kulmination_db"
database_id   = "09ea4508-400c-4ca7-a5a6-b589390381ad"

# Workers Rate Limiting binding (CF Rate Limiting API, GA since 2024).
# In-memory at the edge — no D1 touch on hot path. Currently caps
# POST /api/play at 10 requests per 60-second window per cf-connecting-ip.
# `namespace_id` is just a per-worker identifier, not tied to any CF
# global — any unique integer works. `period` only supports 10 or 60.
[[unsafe.bindings]]
name         = "PLAY_RATELIMIT"
type         = "ratelimit"
namespace_id = "1001"
simple       = { limit = 10, period = 60 }
